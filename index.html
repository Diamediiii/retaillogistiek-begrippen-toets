<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBO Retail Manager - Begrippen Toets</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        .question-box { display: none; }
        .question-box.active { display: block; }
        .option { background: #f8f9fa; border: 2px solid #dee2e6; border-radius: 10px; padding: 15px; margin: 10px 0; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #e9ecef; border-color: #3498db; }
        .option.selected { background: #3498db; color: white; border-color: #2980b9; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        button { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-next { background: #27ae60; color: white; }
        .results-list { text-align: left; margin-top: 20px; padding: 15px; background: #fff5f5; border-radius: 10px; border: 1px solid #feb2b2; }
        .error-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #fed7d7; }
        .wrong { color: #c53030; font-weight: bold; }
        .correct { color: #2f855a; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Retail Begrippen Toets</h1>
    <div id="quiz-area">
        <p id="q-text" style="font-size: 1.2em; font-weight: bold;"></p>
        <div id="options-area"></div>
        <div class="controls">
            <span id="counter">Vraag 1 / 30</span>
            <button class="btn-next" onclick="handleNext()">Volgende</button>
        </div>
    </div>

    <div id="result-area" style="display:none; text-align:center;">
        <h2>Resultaat</h2>
        <p style="font-size: 2em;" id="final-score"></p>
        <div id="error-log"></div>
        <button onclick="location.reload()" style="background:#3498db; color:white; margin-top:20px;">Opnieuw (Nieuwe vragen)</button>
    </div>
</div>

<script>
const fullPool = [
    // Groep 1: Voorraad & Omzet
    { q: "Wat is derving?", a: ["Verlies door diefstal, breuk of bederf", "De brutowinstmarge", "Inkoopwaarde van de omzet"], c: 0 },
    { q: "Consumentenomzet is...", a: ["Omzet exclusief btw", "Omzet inclusief btw", "De winst per klant"], c: 1 },
    { q: "Wat is Cycle Counting?", a: ["Eén keer per jaar de hele winkel tellen", "Regelmatig tellen van delen van de voorraad", "De omzet per uur berekenen"], c: 1 },
    { q: "Wat is de Economische voorraad?", a: ["Voorraad fysiek in het magazijn", "Technische voorraad + Voorinkopen - Voorverkopen", "De voorraad die minimaal nodig is"], c: 1 },
    { q: "Wat is de Omzetsnelheid?", a: ["Hoe snel een klant bij de kassa is", "Aantal keren dat de gemiddelde voorraad per periode wordt verkocht", "De tijd tussen bestellen en leveren"], c: 1 },
    { q: "Netto-omzet is...", a: ["Omzet inclusief btw", "Omzet exclusief btw", "Omzet min alle bedrijfskosten"], c: 1 },
    { q: "Wat is Pijplijnvoorraad?", a: ["Voorraad die in de vrachtwagen onderweg is", "Bestelde maar nog niet geleverde goederen", "Voorraad in het DC"], c: 1 },
    { q: "Wat is Technische voorraad?", a: ["De voorraad volgens de computer", "De werkelijke voorraad aanwezig in het magazijn/winkel", "Voorraad die gereserveerd is"], c: 1 },

    // Groep 2: Bestelproces
    { q: "Wat is een Besteleenheid?", a: ["Hoe vaak je per week bestelt", "Vast aantal artikelen in een verpakking (bijv. doos van 12)", "De grootte van de vrachtwagen"], c: 1 },
    { q: "Wat is het Bestelpunt?", a: ["De plek waar de vrachtwagen lost", "De voorraadhoogte waarbij je een nieuwe bestelling moet plaatsen", "De uiterste datum van bestellen"], c: 1 },
    { q: "Wat is de Levertijd?", a: ["Tijd tussen bestellen en het moment van levering", "Hoe lang de chauffeur mag rijden", "De houdbaarheid van het product"], c: 0 },
    { q: "Wat is Optimale bestelgrootte?", a: ["Zoveel mogelijk bestellen voor korting", "Grootte waarbij de som van bestel- en voorraadkosten het laagst is", "Altijd één volle pallet"], c: 1 },

    // Groep 3: Logistiek & Opslag
    { q: "Wat is FIFO?", a: ["First In, First Out", "Fast In, Fast Out", "First In, Final Out"], c: 0 },
    { q: "Wat is LIFO?", a: ["Least In, First Out", "Last In, First Out", "Last In, Fast Out"], c: 1 },
    { q: "Wat is een Collo?", a: ["Een speciaal soort reachtruck", "Een eenheid waarin goederen worden vervoerd (bijv. een doos)", "Een administratieve fout"], c: 1 },
    { q: "Wat is een Distributiecentrum?", a: ["De backoffice van de winkel", "Centraal magazijn dat winkels bevoorraadt", "Een ander woord voor supermarkt"], c: 1 },
    { q: "Wat is Emballage?", a: ["Verpakkingsmateriaal met statiegeld (meermalig gebruik)", "Luxe cadeauverpakking", "Afval van plastic"], c: 0 },
    { q: "Vrijelocatiesysteem betekent...", a: ["Iedereen mag weten waar de voorraad staat", "Goederen mogen op iedere beschikbare plek worden opgeslagen", "Producten staan altijd op een vaste plek"], c: 1 },

    // Groep 4: Arbo & Veiligheid
    { q: "Wat is een RI&E?", a: ["Risico-inventarisatie en -evaluatie", "Regionale Inkoop en Export", "Reken-instructie voor Examens"], c: 0 },
    { q: "Wat is de Branddriehoek?", a: ["Hitte, zuurstof en brandstof", "Rook, vlammen en as", "Water, CO2 en schuim"], c: 0 },
    { q: "Wat is Ergonomie?", a: ["Kennis van economische wetten", "Aanpassen van de werkomstandigheden aan de mens", "Snelheid van werken"], c: 1 },
    { q: "Wat is HACCP?", a: ["Veiligheidsplan voor brand", "Systeem om de veiligheid van voedselproductie te beheersen", "Rechten van de consument"], c: 1 },
    { q: "Wat is een Calamiteitenplan?", a: ["Plan voor als de stroom uitvalt", "Plan wat te doen bij een grote ramp of ongeval", "Marketingplan voor crisistijd"], c: 1 },

    // Groep 5: Derving & Controle
    { q: "Wat is Criminele derving?", a: ["Fouten in het kassasysteem", "Verlies door opzettelijke handelingen (diefstal/vandalisme)", "Producten die over de datum zijn"], c: 1 },
    { q: "Wat is Administratieve voorraad?", a: ["De voorraad volgens de administratie/computer", "De voorraad die je zelf hebt geteld", "De voorraad in de etalage"], c: 0 },
    { q: "Wat is een Kwantitatieve controle?", a: ["Controle op de kwaliteit van de producten", "Controle op de aantallen geleverde goederen", "Controle op de prijs"], c: 1 },
    { q: "Wat is de Achterdeurprocedure?", a: ["Hoe je de winkel verlaat", "Regels voor het ontvangen van vracht bij de goedereningang", "Controle van tassen van personeel"], c: 1 },
    { q: "Wat is Service Sweethearting?", a: ["Extra vriendelijk zijn tegen klanten", "Diefstal door personeel voor vrienden of familie (niet aanslaan)", "Producten gratis weggeven aan goede doelen"], c: 1 },
    { q: "Visitatie is...", a: ["Het controleren van tassen en jassen", "Bezoek van de regiomanager", "Klantonderzoek doen"], c: 0 },
    { q: "Wat is de Dervingsnorm?", a: ["De werkelijke derving van vorig jaar", "Het toegestane percentage derving", "De wet over diefstal"], c: 1 }
];

let selectedQuestions = [];
let currentIdx = 0;
let score = 0;
let mistakes = [];
let userChoice = null;

function startQuiz() {
    // Schud de hele pool en pak er 30
    selectedQuestions = fullPool.sort(() => 0.5 - Math.random()).slice(0, 30);
    showQuestion();
}

function showQuestion() {
    userChoice = null;
    const q = selectedQuestions[currentIdx];
    document.getElementById("q-text").innerText = q.q;
    document.getElementById("counter").innerText = `Vraag ${currentIdx + 1} / 30`;
    
    const area = document.getElementById("options-area");
    area.innerHTML = "";
    q.a.forEach((opt, i) => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerText = opt;
        div.onclick = () => {
            const all = document.querySelectorAll(".option");
            all.forEach(el => el.classList.remove("selected"));
            div.classList.add("selected");
            userChoice = i;
        };
        area.appendChild(div);
    });
}

function handleNext() {
    if (userChoice === null) return alert("Kies een antwoord!");

    const q = selectedQuestions[currentIdx];
    if (userChoice === q.c) {
        score++;
    } else {
        mistakes.push({
            vraag: q.q,
            jouwAntwoord: q.a[userChoice],
            correctAntwoord: q.a[q.c]
        });
    }

    currentIdx++;
    if (currentIdx < 30) {
        showQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    document.getElementById("quiz-area").style.display = "none";
    document.getElementById("result-area").style.display = "block";
    document.getElementById("final-score").innerText = `${score} / 30`;

    const log = document.getElementById("error-log");
    if (mistakes.length === 0) {
        log.innerHTML = "<p class='correct'>Foutloos! Je bent een expert.</p>";
    } else {
        log.innerHTML = "<h3>Verbeterpunten:</h3>";
        mistakes.forEach(m => {
            log.innerHTML += `
                <div class="results-list">
                    <p><strong>Vraag:</strong> ${m.vraag}</p>
                    <p class="wrong">Jouw antwoord: ${m.jouwAntwoord}</p>
                    <p class="correct">Juist antwoord: ${m.correctAntwoord}</p>
                </div>`;
        });
    }
}

startQuiz();
</script>
</body>
</html>
