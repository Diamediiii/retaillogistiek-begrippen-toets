        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .option { background: #edf2f7; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .option:hover { border-color: #4299e1; background: #e2e8f0; }

        button { width: 100%; padding: 15px; background: #48bb78; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        button:hover { background: #38a169; }
        #result-area { display: none; }
        .error-card { border-left: 5px solid #f56565; padding: 15px; margin: 15px 0; background: #fff5f5; border-radius: 5px; }
        .header {
        background-color: #004c97; /* Hoogvliet Blauw */
        color: white;
        padding: 20px;
        text-align: center;
        border-radius: 15px 15px 0 0;
        margin: -30px -30px 20px -30px; /* Zorgt dat hij perfect aansluit op de randen */
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
}

    .header h1 {
        margin: 0;
        font-size: 1.8em;
    }
    </style>

    {q: "HACCP is...", a: ["Systeem voor voedselveiligheid", "Veiligheidsplan voor brand", "Kassasysteem"], c: 0},
    {q: "RI&E staat voor...", a: ["Risico-inventarisatie en -evaluatie", "Retail Inkoop en Export", "Regionale Inkoop-Eis"], c: 0},

let selected = [];
let cur = 0;
let score = 0;
let errors = [];
let choice = null;

function start() {
    selected = [...fullPool].sort(() => 0.5 - Math.random()).slice(0, 30);
    cur = 0; score = 0; errors = [];
    document.getElementById("quiz-area").style.display = "block";
    document.getElementById("result-area").style.display = "none";
    show();
}

function show() {
    choice = null;
    const q = selected[cur];
    document.getElementById("counter").innerText = "Vraag " + (cur + 1) + "/30";
    document.getElementById("q-text").innerText = q.q;
    const optArea = document.getElementById("options-area");
    optArea.innerHTML = "";
    q.a.forEach((a, i) => {
        const d = document.createElement("div");
        d.className = "option";
        d.innerText = a;
        d.onclick = () => {
            document.querySelectorAll(".option").forEach(e => e.className = "option");
            d.className = "option selected";
            choice = i;
        };
        optArea.appendChild(d);
    });
}

function handleNext() {
    if (choice === null) return alert("Selecteer een antwoord!");
    if (choice === selected[cur].c) score++;
    else errors.push({q: selected[cur].q, u: selected[cur].a[choice], c: selected[cur].a[selected[cur].c]});
    
    cur++;
    if (cur < 30) show();
    else end();
}

function end() {
    document.getElementById("quiz-area").style.display = "none";
    document.getElementById("result-area").style.display = "block";
    document.getElementById("final-score").innerText = score + "/30";
    const log = document.getElementById("error-log");
    log.innerHTML = "";
    errors.forEach(e => {
        log.innerHTML += `<div class="error-card"><b>${e.q}</b><br><span style="color:red">Jouw antwoord: ${e.u}</span><br><span style="color:green">Juist: ${e.c}</span></div>`;
    });
}

start();
</script>
