<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Manager Examens</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --hoogvliet-blue: #004c97;
            --hoogvliet-green: #86bc25;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container { 
            width: 95%;
            max-width: 700px; 
            background: var(--card-bg); 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header {
            background: linear-gradient(135deg, var(--hoogvliet-blue), #003366);
            padding: 40px 20px; /* Iets meer ruimte boven en onder nu het logo weg is */
            text-align: center;
            border-bottom: 4px solid var(--hoogvliet-green);
        }
        
        .header h1 {
            margin: 0;
            font-size: 1.8em; /* Iets groter voor de impact */
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); /* Geeft die diepte aan de witte tekst */
        }

        .quiz-content { padding: 30px; }

        #counter { color: var(--hoogvliet-green); font-weight: bold; margin-bottom: 10px; display: block; }

        #q-text { font-size: 1.3em; line-height: 1.4; margin-bottom: 25px; min-height: 60px; }

        .option { 
            background: rgba(255,255,255,0.05); 
            padding: 18px; 
            margin: 12px 0; 
            border-radius: 12px; 
            cursor: pointer; 
            border: 2px solid transparent; 
            transition: all 0.3s ease;
            font-size: 1.05em;
        }

        .option:hover { 
            background: rgba(255,255,255,0.1); 
            border-color: var(--text-dim);
            transform: translateX(5px);
        }

        .selected { 
            background: var(--hoogvliet-blue) !important; 
            border-color: var(--hoogvliet-green) !important;
            box-shadow: 0 0 15px rgba(134, 188, 37, 0.3);
        }

        button { 
            width: 100%; 
            padding: 18px; 
            background: var(--hoogvliet-green); 
            color: #000; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1.1em; 
            text-transform: uppercase;
            margin-top: 20px;
            transition: 0.3s;
        }

        button:hover { 
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #result-area { display: none; text-align: center; }

        .error-card { 
            text-align: left;
            background: rgba(0,0,0,0.2); 
            padding: 20px; 
            margin: 15px 0; 
            border-radius: 12px;
            border-left: 4px solid #ef4444;
        }

        .correct-ans { color: var(--hoogvliet-green); font-weight: bold; }
        .wrong-ans { color: #f87171; text-decoration: line-through; font-size: 0.9em; }

        /* Mobile tweaks */
        @media (max-width: 480px) {
            .header h1 { font-size: 1.2em; }
            .quiz-content { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
    <h1>Oefentoets Retaillogistiek</h1>
    </div>
    <div id="quiz-area">
        <h3 id="counter">Vraag 1/30</h3>
        <p id="q-text" style="font-weight:bold; font-size:1.25em; min-height: 50px;"></p>
        <div id="options-area"></div>
        <button onclick="handleNext()" style="margin-top:20px;">Volgende Vraag</button>
    </div>
    <div id="result-area">
        <h2>Toets voltooid! Score: <span id="final-score"></span></h2>
        <p>Hieronder zie je de begrippen die je nog moet oefenen:</p>
        <div id="error-log"></div>
        <button onclick="location.reload()" style="background:#4299e1;">Nieuwe Toets (30 andere vragen)</button>
    </div>
</div>

let selected = [];
let cur = 0;
let score = 0;
let errors = [];
let choice = null;

function start() {
    selected = [...fullPool].sort(() => 0.5 - Math.random()).slice(0, 30);
    cur = 0; score = 0; errors = [];
    document.getElementById("quiz-area").style.display = "block";
    document.getElementById("result-area").style.display = "none";
    show();
}

function show() {
    choice = null;
    const qData = selected[cur];
    
    // Maak een kopie van de antwoorden met hun index
    let options = qData.a.map((text, index) => ({ text, index }));
    
    // Hussel de antwoorden willekeurig
    options.sort(() => 0.5 - Math.random());

    document.getElementById("counter").innerText = "Vraag " + (cur + 1) + "/30";
    document.getElementById("q-text").innerText = qData.q;
    
    const optArea = document.getElementById("options-area");
    optArea.innerHTML = "";
    
    options.forEach((opt) => {
        const d = document.createElement("div");
        d.className = "option";
        d.innerText = opt.text;
        d.onclick = () => {
            document.querySelectorAll(".option").forEach(e => e.className = "option");
            d.className = "option selected";
            // We slaan de oorspronkelijke index op om te checken of het antwoord goed is
            choice = opt.index;
        };
        optArea.appendChild(d);
    });
}

    

function handleNext() {
    if (choice === null) return alert("Selecteer een antwoord!");
    if (choice === selected[cur].c) score++;
    else errors.push({q: selected[cur].q, u: selected[cur].a[choice], c: selected[cur].a[selected[cur].c]});
    
    cur++;
    if (cur < 30) show();
    else end();
}

function end() {
    document.getElementById("quiz-area").style.display = "none";
    document.getElementById("result-area").style.display = "block";
    document.getElementById("final-score").innerText = score + "/30";
    const log = document.getElementById("error-log");
    log.innerHTML = "";
    errors.forEach(e => {
        log.innerHTML += `<div class="error-card"><b>${e.q}</b><br><span style="color:red">Jouw antwoord: ${e.u}</span><br><span style="color:green">Juist: ${e.c}</span></div>`;
    });
}

start();
</script>
</body>
</html>
