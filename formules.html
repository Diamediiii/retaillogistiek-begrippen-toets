<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekenen - Hoogvliet Academy</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --hoogvliet-blue: #004c97;
            --hoogvliet-green: #86bc25;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .container { width: 95%; max-width: 600px; background: var(--card-bg); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); overflow: hidden; position: relative; z-index: 10; }
        .header { background: linear-gradient(135deg, var(--hoogvliet-blue), #003366); padding: 25px; text-align: center; border-bottom: 4px solid var(--hoogvliet-green); }
        .quiz-content { padding: 30px; }
        #q-text { font-size: 1.2em; line-height: 1.6; margin-bottom: 20px; min-height: 100px; }
        input[type="text"] { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 1.2em; text-align: center; box-sizing: border-box; outline: none; margin: 20px 0; }
        input[type="text"]:focus { border-color: var(--hoogvliet-blue); }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; line-height: 1.4; }
        .feedback-correct { background: rgba(134, 188, 37, 0.2); border: 1px solid var(--hoogvliet-green); color: var(--hoogvliet-green); }
        .feedback-wrong { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--error); color: #fca5a5; }
        button { width: 100%; padding: 18px; background: var(--hoogvliet-green); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        #next-btn { background: var(--hoogvliet-blue); color: white; display: none; }
        #result-area { display: none; text-align: center; }
        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; }
    </style>
</head>
<body>

<canvas id="fireworks-canvas"></canvas>

<div class="container">
    <div class="header"><h1>Rekenen & Kengetallen</h1></div>
    <div class="quiz-content">
        <div id="quiz-area">
            <span id="counter" style="color: var(--hoogvliet-green); font-weight: bold; display: block; margin-bottom: 10px;">VRAAG 1/10</span>
            <p id="q-text"></p>
            <input type="text" id="user-input" placeholder="Typ je antwoord..." autocomplete="off">
            <div id="feedback"></div>
            <button id="check-btn" onclick="checkAnswer()">Controleer</button>
            <button id="next-btn" onclick="nextQuestion()">Volgende Vraag</button>
        </div>

        <div id="result-area">
            <h2 style="font-size: 2.5em; margin-bottom: 10px;">Toets voltooid! ✨</h2>
            <div id="final-score" style="font-size: 3.5em; color: var(--hoogvliet-green); margin: 20px 0; font-weight: 800;"></div>
            <p id="congrats-text" style="color: var(--text-dim); margin-bottom: 30px;"></p>
            <button onclick="location.reload()">Opnieuw Starten</button>
            <button onclick="window.location.href='index.html'" style="background: #334155; color: white; margin-top: 10px;">Menu</button>
        </div>
    </div>
</div>

<script>
let questions = [];
let cur = 0;
let score = 0;

function generateQuestions() {
    const typeEV = () => {
        const tv = Math.floor(Math.random() * 500) + 200;
        const bo = Math.floor(Math.random() * 100) + 20;
        const vl = Math.floor(Math.random() * 50) + 10;
        const ans = tv + bo - vl;
        return { q: `Bereken de **Economische Voorraad**:<br><br>Technische voorraad: **${tv}**<br>Bestelde goederen: **${bo}**<br>Verkochte goederen: **${vl}**`, c: ans, exp: `**Uitleg:** TV (${tv}) + Besteld (${bo}) - Verkocht (${vl}) = **${ans}**` };
    };

    const typeOS = () => {
        const omzet = (Math.floor(Math.random() * 50) + 10) * 100;
        const gv = (Math.floor(Math.random() * 5) + 2) * 100;
        const res = omzet / gv;
        const ans = Number.isInteger(res) ? res : res.toFixed(1);
        return { q: `Bereken de **Omzetsnelheid**:<br>*(Indien nodig afronden op 1 decimaal)*<br><br>Netto-omzet: **€${omzet}**<br>Gemiddelde voorraad: **€${gv}**`, c: ans, exp: `**Uitleg:** Netto-omzet (€${omzet}) / Gem. Voorraad (€${gv}) = **${ans}**` };
    };

    const typeOD = () => {
        const os = Math.floor(Math.random() * 6) + 4;
        const ans = Math.round(360 / os);
        return { q: `Bereken de **Omzetduur in dagen**:<br><br>De omzetsnelheid is **${os}**.<br>(Gebruik 360 dagen)`, c: ans, exp: `**Uitleg:** 360 / Omzetsnelheid (${os}) = **${ans}** dagen` };
    };

    const typeSG = () => {
        const lev = Math.floor(Math.random() * 100) + 850;
        const tot = 1000;
        const res = (lev / tot) * 100;
        const ans = Number.isInteger(res) ? res : res.toFixed(1);
        return { q: `Bereken de **Servicegraad** in %:<br>*(Indien nodig afronden op 1 decimaal)*<br><br>Direct leverbaar: **${lev}**<br>Totaal assortiment: **${tot}**`, c: ans, exp: `**Uitleg:** (${lev} / ${tot}) x 100% = **${ans}%**` };
    };

    let pool = [typeOS(), typeOS(), typeEV(), typeEV(), typeEV(), typeOD(), typeOD(), typeOD(), typeSG(), typeSG()];
    questions = pool.sort(() => 0.5 - Math.random());
}

function show() {
    const q = questions[cur];
    document.getElementById("counter").innerText = `VRAAG ${cur + 1}/10`;
    document.getElementById("q-text").innerHTML = q.q;
    document.getElementById("user-input").value = "";
    document.getElementById("user-input").disabled = false;
    document.getElementById("feedback").style.display = "none";
    document.getElementById("check-btn").style.display = "block";
    document.getElementById("next-btn").style.display = "none";
    setTimeout(() => document.getElementById("user-input").focus(), 10);
}

function checkAnswer() {
    const input = document.getElementById("user-input").value.replace(',', '.').replace('%', '').trim();
    if (input === "") return;
    const q = questions[cur];
    document.getElementById("user-input").disabled = true;
    document.getElementById("check-btn").style.display = "none";
    document.getElementById("next-btn").style.display = "block";
    const fb = document.getElementById("feedback");
    fb.style.display = "block";

    if (parseFloat(input) == parseFloat(q.c)) {
        score++;
        fb.className = "feedback-correct";
        fb.innerHTML = "<b>Lekker gewerkt!</b> Dit is het juiste antwoord.";
    } else {
        fb.className = "feedback-wrong";
        fb.innerHTML = `<b>Helaas!</b> Het juiste antwoord was <b>${q.c}</b>.<br>${q.exp}`;
    }
}

function nextQuestion() {
    cur++;
    if (cur < 10) show();
    else end();
}

function end() {
    document.getElementById("quiz-area").style.display = "none";
    document.getElementById("result-area").style.display = "block";
    document.getElementById("final-score").innerText = `${score} / 10`;
    document.getElementById("congrats-text").innerText = score > 5 ? "Gefeliciteerd! Je bent goed op weg." : "Nog even oefenen voor het examen!";
    if(score > 5) startFireworks();
}

// Vuurwerk (Simpel)
const canvas = document.getElementById('fireworks-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
function startFireworks() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    loop();
}
function loop() {
    requestAnimationFrame(loop);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(Math.random() < 0.1) {
        let x = Math.random()*canvas.width, y = Math.random()*canvas.height/2;
        for(let i=0; i<20; i++) particles.push({x, y, a:Math.random()*Math.PI*2, s:Math.random()*3+1, l:1});
    }
    particles.forEach((p,i) => {
        p.x += Math.cos(p.a)*p.s; p.y += Math.sin(p.a)*p.s + 0.1; p.l -= 0.02;
        ctx.fillStyle = `rgba(134,188,37,${p.l})`;
        ctx.beginPath(); ctx.arc(p.x,p.y,2,0,7); ctx.fill();
        if(p.l <= 0) particles.splice(i,1);
    });
}

generateQuestions();
show();
document.getElementById("user-input").onkeypress = (e) => { if(e.key === "Enter") document.getElementById("check-btn").style.display !== "none" ? checkAnswer() : nextQuestion(); };
</script>
</body>
</html>
