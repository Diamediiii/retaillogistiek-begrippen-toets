<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekenen - Hoogvliet Academy</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --hoogvliet-blue: #004c97;
            --hoogvliet-green: #86bc25;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .container { 
            width: 95%; 
            max-width: 700px; 
            background: var(--card-bg); 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        .header { 
            background: linear-gradient(135deg, var(--hoogvliet-blue), #003366); 
            padding: 30px; 
            text-align: center; 
            border-bottom: 4px solid var(--hoogvliet-green); 
        }

        .header h1 { margin: 0; font-size: 1.5em; text-transform: uppercase; letter-spacing: 1px; }

        .quiz-content { padding: 30px; }

        #q-text { font-size: 1.2em; line-height: 1.5; margin-bottom: 25px; min-height: 80px; }

        .option { 
            background: rgba(255,255,255,0.05); 
            padding: 18px; 
            margin: 12px 0; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: 0.3s; 
            border: 2px solid transparent; 
        }

        .option:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }

        .selected { 
            background: var(--hoogvliet-blue) !important; 
            border-color: var(--hoogvliet-green) !important; 
        }

        button { 
            width: 100%; 
            padding: 18px; 
            background: var(--hoogvliet-green); 
            color: #000; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 20px; 
            font-size: 1em;
            text-transform: uppercase;
        }

        #result-area { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Rekenen & Kengetallen</h1></div>
    <div class="quiz-content">
        <div id="quiz-area">
            <span id="counter" style="color: var(--hoogvliet-green); font-weight: bold; display: block; margin-bottom: 10px;">VRAAG 1/10</span>
            <p id="q-text"></p>
            <div id="options-area"></div>
            <button id="next-btn" onclick="checkAnswer()">Controleer Antwoord</button>
        </div>
        <div id="result-area">
            <h2 style="font-size: 2em;">Resultaat</h2>
            <div id="final-score" style="font-size: 2.5em; color: var(--hoogvliet-green); margin: 20px 0;"></div>
            <button onclick="location.reload()">Opnieuw Starten</button>
            <button onclick="window.location.href='index.html'" style="background: #334155; color: white; margin-top: 10px;">Terug naar Menu</button>
        </div>
    </div>
</div>

<script>
let questions = [];
let cur = 0;
let score = 0;
let selectedChoice = null;

function generateQuestions() {
    const types = [
        // Economische Voorraad
        () => {
            const tv = Math.floor(Math.random() * 500) + 200;
            const bo = Math.floor(Math.random() * 100) + 20;
            const vl = Math.floor(Math.random() * 50) + 10;
            const ans = tv + bo - vl;
            return {
                q: `Bereken de **Economische Voorraad**:<br><br>Technische voorraad: ${tv}<br>Bestelde goederen: ${bo}<br>Verkochte (nog te leveren) goederen: ${vl}`,
                options: [ans, ans + 25, ans - 15],
                c: ans,
                exp: `Uitleg: TV (${tv}) + Besteld (${bo}) - Verkocht (${vl}) = ${ans}`
            };
        },
        // Omzetsnelheid
        () => {
            const omzet = (Math.floor(Math.random() * 50) + 10) * 100;
            const gv = (Math.floor(Math.random() * 5) + 2) * 100;
            const ans = (omzet / gv).toFixed(1);
            return {
                q: `Bereken de **Omzetsnelheid**:<br><br>Netto-omzet: €${omzet}<br>Gemiddelde voorraad (inkoopwaarde): €${gv}`,
                options: [ans, (omzet/gv + 1.5).toFixed(1), (omzet/gv - 0.8).toFixed(1)],
                c: ans,
                exp: `Uitleg: Netto-omzet (€${omzet}) / Gemiddelde Voorraad (€${gv}) = ${ans}`
            };
        },
        // Omzetduur
        () => {
            const os = Math.floor(Math.random() * 6) + 4;
            const ans = Math.round(360 / os);
            return {
                q: `Bereken de **Omzetduur in dagen**:<br><br>De omzetsnelheid is ${os}.<br>(Gebruik 360 dagen per jaar)`,
                options: [ans, Math.round(365/os), os * 30],
                c: ans,
                exp: `Uitleg: 360 dagen / Omzetsnelheid (${os}) = ${ans} dagen`
            };
        },
        // Servicegraad
        () => {
            const leverbaar = Math.floor(Math.random() * 100) + 850;
            const totaal = 1000;
            const ans = ((leverbaar / totaal) * 100).toFixed(1) + "%";
            return {
                q: `Bereken de **Servicegraad**:<br><br>Aantal artikelen direct leverbaar: ${leverbaar}<br>Totaal aantal artikelen in assortiment: ${totaal}`,
                options: [ans, "92.5%", "88.0%"],
                c: ans,
                exp: `Uitleg: (Leverbaar: ${leverbaar} / Totaal: ${totaal}) x 100% = ${ans}`
            };
        }
    ];

    questions = [];
    for(let i=0; i<10; i++) {
        const randomType = types[Math.floor(Math.random() * types.length)];
        questions.push(randomType());
    }
}

function show() {
    selectedChoice = null;
    const q = questions[cur];
    document.getElementById("counter").innerText = `VRAAG ${cur + 1}/10`;
    document.getElementById("q-text").innerHTML = q.q;
    const area = document.getElementById("options-area");
    area.innerHTML = "";
    
    // Antwoorden husselen
    let shuffledOptions = [...q.options].sort(() => 0.5 - Math.random());

    shuffledOptions.forEach(opt => {
        const d = document.createElement("div");
        d.className = "option";
        d.innerText = opt;
        d.onclick = () => {
            document.querySelectorAll(".option").forEach(el => el.classList.remove("selected"));
            d.classList.add("selected");
            selectedChoice = opt;
        };
        area.appendChild(d);
    });
}

function checkAnswer() {
    if (selectedChoice === null) {
        alert("Kies eerst een antwoord!");
        return;
    }
    
    const q = questions[cur];
    if (selectedChoice == q.c) {
        score++;
        alert("Correct! Goed gedaan.");
    } else {
        alert("Helaas, dat is niet juist.\n\n" + q.exp);
    }

    cur++;
    if (cur < 10) {
        show();
    } else {
        end();
    }
}

function end() {
    document.getElementById("quiz-area").style.display = "none";
    document.getElementById("result-area").style.display = "block";
    document.getElementById("final-score").innerText = `${score} / 10`;
}

// Start de boel
generateQuestions();
show();
</script>
</body>
</html>
