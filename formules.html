<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekenen - Hoogvliet Academy</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --hoogvliet-blue: #004c97; 
            --hoogvliet-green: #86bc25; 
            --text-main: #f8fafc; 
            --text-dim: #94a3b8; 
            --error: #ef4444; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .container { width: 95%; max-width: 600px; background: var(--card-bg); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); overflow: hidden; position: relative; z-index: 10; }
        .header { background: linear-gradient(135deg, var(--hoogvliet-blue), #003366); padding: 25px; text-align: center; border-bottom: 4px solid var(--hoogvliet-green); }
        .header h1 { margin: 0; font-size: 1.8em; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }
        .quiz-content { padding: 30px; }
        #q-text { font-size: 1.1em; line-height: 1.6; margin-bottom: 20px; min-height: 120px; }
        input[type="text"] { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 1.2em; text-align: center; box-sizing: border-box; outline: none; margin: 10px 0; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--hoogvliet-blue); background: rgba(255,255,255,0.08); }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; line-height: 1.4; }
        .feedback-correct { background: rgba(134, 188, 37, 0.2); border: 1px solid var(--hoogvliet-green); color: var(--hoogvliet-green); }
        .feedback-wrong { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--error); color: #fca5a5; }
        button { width: 100%; padding: 18px; background: var(--hoogvliet-green); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        #next-btn { background: var(--hoogvliet-blue); color: white; display: none; }
        #result-area { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Rekenen & Kengetallen</h1></div>
    <div class="quiz-content">
        <div id="quiz-area">
            <span id="counter" style="color: var(--hoogvliet-green); font-weight: bold; display: block; margin-bottom: 10px;">VRAAG 1/10</span>
            <div id="q-text"></div>
            <input type="text" id="user-input" placeholder="Typ je antwoord..." autocomplete="off">
            <div id="feedback"></div>
            <button id="check-btn" onclick="checkAnswer()">Controleer</button>
            <button id="next-btn" onclick="nextQuestion()">Volgende Vraag</button>
        </div>

        <div id="result-area">
            <h2 style="font-size: 2.2em; margin-bottom: 10px;">Toets voltooid! ✨</h2>
            <div id="final-score" style="font-size: 3em; color: var(--hoogvliet-green); margin: 20px 0; font-weight: 800;"></div>
            <p id="grade-text" style="font-size: 1.2em; margin-bottom: 10px; color: white;"></p>
            <p id="congrats-text" style="color: var(--text-dim); margin-bottom: 30px;"></p>
            <button onclick="location.reload()">Opnieuw Starten</button>
            <button onclick="window.location.href='index.html'" style="background: var(--hoogvliet-blue); color: white; margin-top: 10px;">Terug naar Home</button>
        </div>
    </div>
</div>

<script>
let questions = [];
let cur = 0;
let score = 0;

function triggerFeest() {
    confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 },
        colors: ['#86bc25', '#004c97', '#ffffff']
    });
}

function generateQuestions() {
    // Bestelpunt formule generator (4 varianten)
    const typeBP = () => {
        const lt = Math.floor(Math.random() * 3) + 1; // 1, 2 of 3 leverdagen
        const da = Math.floor(Math.random() * 74) + 7; // Dagafzet tussen 7 en 80
        const vv = Math.floor(Math.random() * 46) + 5; // Veiligheidsvoorraad tussen 5 en 50
        const bp = (lt * da) + vv; // Formule: BP = (LT * DA) + VV

        const variant = Math.floor(Math.random() * 4);
        if (variant === 0) {
            return {
                q: `<b>Bereken het Bestelpunt (BP):</b><br><br>Levertijd (LT): ${lt} dagen<br>Dagafzet (DA): ${da} stuks per dag<br>Veiligheidsvoorraad (VV): ${vv} stuks`,
                c: bp,
                exp: `Uitleg: Bestelpunt = (Levertijd × Dagafzet) + Veiligheidsvoorraad<br>(${lt} × ${da}) + ${vv} = ${bp}`
            };
        } else if (variant === 1) {
            return {
                q: `<b>Bereken de Veiligheidsvoorraad (VV):</b><br><br>Bestelpunt (BP): ${bp} stuks<br>Levertijd (LT): ${lt} dagen<br>Dagafzet (DA): ${da} stuks per dag`,
                c: vv,
                exp: `Uitleg: Veiligheidsvoorraad = Bestelpunt - (Levertijd × Dagafzet)<br>${bp} - (${lt} × ${da}) = ${vv}`
            };
        } else if (variant === 2) {
            return {
                q: `<b>Bereken de Dagafzet (DA):</b><br><br>Bestelpunt (BP): ${bp} stuks<br>Levertijd (LT): ${lt} dagen<br>Veiligheidsvoorraad (VV): ${vv} stuks`,
                c: da,
                exp: `Uitleg: Dagafzet = (Bestelpunt - Veiligheidsvoorraad) / Levertijd<br>(${bp} - ${vv}) / ${lt} = ${da}`
            };
        } else {
            return {
                q: `<b>Bereken de Levertijd (LT) in dagen:</b><br><br>Bestelpunt (BP): ${bp} stuks<br>Dagafzet (DA): ${da} stuks per dag<br>Veiligheidsvoorraad (VV): ${vv} stuks`,
                c: lt,
                exp: `Uitleg: Levertijd = (Bestelpunt - Veiligheidsvoorraad) / Dagafzet<br>(${bp} - ${vv}) / ${da} = ${lt} dagen`
            };
        }
    };

    const typeEV = () => {
        const tv = Math.floor(Math.random() * 500) + 200, bo = Math.floor(Math.random() * 100) + 20, vl = Math.floor(Math.random() * 50) + 10;
        const ans = tv + bo - vl;
        return { q: `<b>Bereken de Economische Voorraad:</b><br><br>Technische voorraad: ${tv}<br>Bestelde goederen: ${bo}<br>Verkochte goederen: ${vl}`, c: ans, exp: `Uitleg: ${tv} + ${bo} - ${vl} = ${ans}` };
    };

    const typeOS = () => {
        const omzet = (Math.floor(Math.random() * 50) + 10) * 100, gv = (Math.floor(Math.random() * 5) + 2) * 100;
        const res = omzet / gv;
        const ans = Number.isInteger(res) ? res : res.toFixed(1);
        return { q: `<b>Bereken de Omzetsnelheid:</b><br><i>(Indien nodig afronden op 1 decimaal)</i><br><br>Netto-omzet: €${omzet}<br>Gemiddelde voorraad: €${gv}`, c: ans, exp: `Uitleg: €${omzet} / €${gv} = ${ans}` };
    };

    const typeOD = () => {
        const os = (Math.random() * 4 + 4).toFixed(1);
        const ans = Math.round(360 / os);
        return { q: `<b>Bereken de Omzetduur in dagen:</b><br><br>De omzetsnelheid is ${os}.<br>(Gebruik 360 dagen)`, c: ans, exp: `Uitleg: 360 / ${os} = ${ans} dagen` };
    };

    const typeSG = () => {
        const tot = Math.floor(Math.random() * 1100) + 400;
        const lev = Math.floor(tot * (Math.random() * 0.15 + 0.82));
        const res = (lev / tot) * 100;
        const ans = Number.isInteger(res) ? res : res.toFixed(1);
        return { q: `<b>Bereken de Servicegraad in %:</b><br><i>(Indien nodig afronden op 1 decimaal)</i><br><br>Direct leverbaar: ${lev}<br>Totaal assortiment: ${tot}`, c: ans, exp: `Uitleg: (${lev} / ${tot}) x 100% = ${ans}%` };
    };

    const typeGV2 = () => {
        const b = Math.floor(Math.random() * 1000) + 500, e = Math.floor(Math.random() * 1000) + 500;
        const ans = (b + e) / 2;
        return { q: `<b>Bereken de Gemiddelde Voorraad (2 punten):</b><br><br>Beginvoorraad: ${b}<br>Eindvoorraad: ${e}`, c: ans, exp: `Uitleg: (${b} + ${e}) / 2 = ${ans}` };
    };

    const typeGV3 = () => {
        const mnd = ["Januari", "Februari", "Maart", "April", "Mei", "Juni", "Juli", "Augustus", "September", "Oktober", "November", "December"];
        const amt = Math.floor(Math.random() * 3) + 3;
        const start = Math.floor(Math.random() * (mnd.length - amt + 1));
        let lijst = [], som = 0, tekst = "";
        
        for (let i = 0; i < amt; i++) {
            const w = Math.floor(Math.random() * 400) + 600;
            const nm = mnd[start + i];
            lijst.push(w);
            som += (i === 0 || i === amt - 1) ? 0.5 * w : w;
            tekst += `${nm}: ${w}<br>`;
        }
        
        const deler = amt - 1;
        const res = som / deler;
        const ans = Number.isInteger(res) ? res : res.toFixed(1);

        return { 
            q: `<b>Bereken de Gemiddelde Voorraad (${amt} maanden):</b><br><i>(Indien nodig afronden op 1 decimaal)</i><br><br>${tekst}`, 
            c: ans, 
            exp: `Uitleg: (0,5 × ${lijst[0]} + tussenliggende maanden + 0,5 × ${lijst[lijst.length-1]}) / ${deler} = ${ans}` 
        };
    };

    // Pool met 3x de nieuwe Bestelpunt-varianten en de rest van de rekenformules
    let pool = [typeBP(), typeBP(), typeBP(), typeOS(), typeOD(), typeSG(), typeEV(), typeGV2(), typeGV3(), typeGV3()];
    questions = pool.sort(() => 0.5 - Math.random());
}

function show() {
    const q = questions[cur];
    document.getElementById("counter").innerText = `VRAAG ${cur + 1}/10`;
    document.getElementById("q-text").innerHTML = q.q;
    document.getElementById("user-input").value = "";
    document.getElementById("user-input").disabled = false;
    document.getElementById("feedback").style.display = "none";
    document.getElementById("check-btn").style.display = "block";
    document.getElementById("next-btn").style.display = "none";
    setTimeout(() => document.getElementById("user-input").focus(), 10);
}

function checkAnswer() {
    const val = document.getElementById("user-input").value.replace(',', '.').replace('%', '').trim();
    if (val === "") return;
    const q = questions[cur];
    document.getElementById("user-input").disabled = true;
    document.getElementById("check-btn").style.display = "none";
    document.getElementById("next-btn").style.display = "block";
    const fb = document.getElementById("feedback");
    fb.style.display = "block";

    if (parseFloat(val) == parseFloat(q.c)) {
        score++;
        fb.className = "feedback-correct";
        fb.innerHTML = "<b>Lekker gewerkt!</b> Dit is het juiste antwoord.";
    } else {
        fb.className = "feedback-wrong";
        fb.innerHTML = `<b>Helaas!</b> Het juiste antwoord was <b>${q.c}</b>.<br><br>${q.exp}`;
    }
}

function nextQuestion() {
    cur++;
    if (cur < 10) show();
    else end();
}

function end() {
    document.getElementById("quiz-area").style.display = "none";
    document.getElementById("result-area").style.display = "block";
    document.getElementById("final-score").innerText = `${score} / 10`;
    
    // Cijfer berekenen
    let grade = (score / 10) * 10;
    document.getElementById("grade-text").innerText = "Je cijfer is een: " + grade.toFixed(1);
    
    document.getElementById("congrats-text").innerText = score >= 6 ? "Gefeliciteerd! Je hebt een voldoende en bent klaar voor het examen." : "Nog even oefenen met de formules, je komt er wel!";
    
    // Confetti feestje vanaf een voldoende (cijfer 6 of hoger)
    if (score >= 6) {
        triggerFeest();
    }
}

generateQuestions();
show();

document.getElementById("user-input").onkeypress = (e) => { 
    if(e.key === "Enter") {
        document.getElementById("check-btn").style.display !== "none" ? checkAnswer() : nextQuestion();
    }
};
</script>
</body>
</html>
