<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekenen - Hoogvliet Academy</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --hoogvliet-blue: #004c97;
            --hoogvliet-green: #86bc25;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .container { 
            width: 95%; 
            max-width: 600px; 
            background: var(--card-bg); 
            border-radius: 20px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1); 
            overflow: hidden;
        }

        .header { 
            background: linear-gradient(135deg, var(--hoogvliet-blue), #003366); 
            padding: 25px; 
            text-align: center; 
            border-bottom: 4px solid var(--hoogvliet-green); 
        }

        .quiz-content { padding: 30px; }

        #q-text { font-size: 1.2em; line-height: 1.6; margin-bottom: 20px; }

        .input-wrapper { margin: 20px 0; }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1.2em;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus { border-color: var(--hoogvliet-blue); background: rgba(255,255,255,0.1); }

        #feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
            line-height: 1.4;
        }

        .feedback-correct { background: rgba(134, 188, 37, 0.2); border: 1px solid var(--hoogvliet-green); color: var(--hoogvliet-green); }
        .feedback-wrong { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--error); color: #fca5a5; }

        button { 
            width: 100%; 
            padding: 18px; 
            background: var(--hoogvliet-green); 
            color: #000; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 10px;
            text-transform: uppercase;
        }

        #next-btn { background: var(--hoogvliet-blue); color: white; display: none; }

        #result-area { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Rekenen & Kengetallen</h1></div>
    <div class="quiz-content">
        <div id="quiz-area">
            <span id="counter" style="color: var(--hoogvliet-green); font-weight: bold; display: block; margin-bottom: 10px;">VRAAG 1/10</span>
            <p id="q-text"></p>
            
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Typ je antwoord..." autocomplete="off">
            </div>

            <div id="feedback"></div>

            <button id="check-btn" onclick="checkAnswer()">Controleer</button>
            <button id="next-btn" onclick="nextQuestion()">Volgende Vraag</button>
        </div>

        <div id="result-area">
            <h2 style="font-size: 2em;">Toets voltooid!</h2>
            <div id="final-score" style="font-size: 2.5em; color: var(--hoogvliet-green); margin: 20px 0;"></div>
            <button onclick="location.reload()">Opnieuw Starten</button>
            <button onclick="window.location.href='index.html'" style="background: #334155; color: white; margin-top: 10px;">Menu</button>
        </div>
    </div>
</div>

<script>
let questions = [];
let cur = 0;
let score = 0;

function generateQuestions() {
    const types = [
        () => {
            const tv = Math.floor(Math.random() * 500) + 200;
            const bo = Math.floor(Math.random() * 100) + 20;
            const vl = Math.floor(Math.random() * 50) + 10;
            const ans = tv + bo - vl;
            return {
                q: `Bereken de **Economische Voorraad**:<br><br>Technische voorraad: **${tv}**<br>Bestelde goederen: **${bo}**<br>Verkochte goederen: **${vl}**`,
                c: ans,
                exp: `**Uitleg:** TV (${tv}) + Besteld (${bo}) - Verkocht (${vl}) = **${ans}**`
            };
        },
        () => {
            const omzet = (Math.floor(Math.random() * 50) + 10) * 100;
            const gv = (Math.floor(Math.random() * 5) + 2) * 100;
            const ans = (omzet / gv).toFixed(1);
            return {
                q: `Bereken de **Omzetsnelheid** (1 decimaal):<br><br>Netto-omzet: **€${omzet}**<br>Gemiddelde voorraad: **€${gv}**`,
                c: ans,
                exp: `**Uitleg:** Netto-omzet (€${omzet}) / Gem. Voorraad (€${gv}) = **${ans}**`
            };
        },
        () => {
            const os = Math.floor(Math.random() * 6) + 4;
            const ans = Math.round(360 / os);
            return {
                q: `Bereken de **Omzetduur in dagen**:<br><br>De omzetsnelheid is **${os}**.<br>(Gebruik 360 dagen)`,
                c: ans,
                exp: `**Uitleg:** 360 / Omzetsnelheid (${os}) = **${ans}** dagen`
            };
        },
        () => {
            const leverbaar = Math.floor(Math.random() * 100) + 850;
            const totaal = 1000;
            const ans = ((leverbaar / totaal) * 100).toFixed(1);
            return {
                q: `Bereken de **Servicegraad** in % (1 decimaal):<br><br>Direct leverbaar: **${leverbaar}**<br>Totaal assortiment: **${totaal}**`,
                c: ans,
                exp: `**Uitleg:** (${leverbaar} / ${totaal}) x 100% = **${ans}%**`
            };
        }
    ];

    questions = [];
    for(let i=0; i<10; i++) {
        questions.push(types[Math.floor(Math.random() * types.length)]());
    }
}

function show() {
    const q = questions[cur];
    document.getElementById("counter").innerText = `VRAAG ${cur + 1}/10`;
    document.getElementById("q-text").innerHTML = q.q;
    document.getElementById("user-input").value = "";
    document.getElementById("user-input").disabled = false;
    document.getElementById("feedback").style.display = "none";
    document.getElementById("check-btn").style.display = "block";
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("user-input").focus();
}

function checkAnswer() {
    const inputField = document.getElementById("user-input");
    const rawInput = inputField.value.replace(',', '.').replace('%', '').trim();
    const q = questions[cur];
    const feedback = document.getElementById("feedback");
    
    if (rawInput === "") return;

    inputField.disabled = true;
    document.getElementById("check-btn").style.display = "none";
    document.getElementById("next-btn").style.display = "block";
    feedback.style.display = "block";

    // Vergelijk getallen (float)
    if (parseFloat(rawInput) == parseFloat(q.c)) {
        score++;
        feedback.className = "feedback-correct";
        feedback.innerHTML = "<b>Lekker gewerkt!</b> Dit is het juiste antwoord.";
    } else {
        feedback.className = "feedback-wrong";
        feedback.innerHTML = `<b>Helaas!</b> Het juiste antwoord was <b>${q.c}</b>.<br>${q.exp}`;
    }
}

function nextQuestion() {
    cur++;
    if (cur < 10) show();
    else end();
}

function end() {
    document.getElementById("quiz-area").style.display = "none";
    document.getElementById("result-area").style.display = "block";
    document.getElementById("final-score").innerText = `${score} / 10`;
}

// Start
generateQuestions();
show();

// Enter-knop ondersteuning
document.getElementById("user-input").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        if (document.getElementById("check-btn").style.display !== "none") {
            checkAnswer();
        } else {
            nextQuestion();
        }
    }
});
</script>
</body>
</html>
