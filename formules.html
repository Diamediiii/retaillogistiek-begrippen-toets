<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekenen - Hoogvliet Academy</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --hoogvliet-blue: #004c97; 
            --hoogvliet-green: #86bc25; 
            --text-main: #f8fafc; 
            --text-dim: #94a3b8; 
            --error: #ef4444; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .container { width: 95%; max-width: 600px; background: var(--card-bg); border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); overflow: hidden; position: relative; z-index: 10; }
        .header { background: linear-gradient(135deg, var(--hoogvliet-blue), #003366); padding: 25px; text-align: center; border-bottom: 4px solid var(--hoogvliet-green); }
        .header h1 { margin: 0; font-size: 1.8em; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }
        .quiz-content { padding: 30px; }
        #q-text { font-size: 1.1em; line-height: 1.6; margin-bottom: 20px; min-height: 120px; }
        input[type="text"] { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 1.2em; text-align: center; box-sizing: border-box; outline: none; margin: 10px 0; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--hoogvliet-blue); background: rgba(255,255,255,0.08); }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; line-height: 1.4; }
        .feedback-correct { background: rgba(134, 188, 37, 0.2); border: 1px solid var(--hoogvliet-green); color: var(--hoogvliet-green); }
        .feedback-wrong { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--error); color: #fca5a5; }
        button { width: 100%; padding: 18px; background: var(--hoogvliet-green); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        #next-btn { background: var(--hoogvliet-blue); color: white; display: none; }
        #result-area { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Rekenen & Kengetallen</h1></div>
    <div class="quiz-content">
        <div id="quiz-area">
            <span id="counter" style="color: var(--hoogvliet-green); font-weight: bold; display: block; margin-bottom: 10px;">VRAAG 1/10</span>
            <div id="q-text"></div>
            <input type="text" id="user-input" placeholder="Typ je antwoord..." autocomplete="off">
            <div id="feedback"></div>
            <button id="check-btn" onclick="checkAnswer()">Controleer</button>
            <button id="next-btn" onclick="nextQuestion()">Volgende Vraag</button>
        </div>

        <div id="result-area">
            <h2 style="font-size: 2.2em; margin-bottom: 10px;">Toets voltooid! ✨</h2>
            <div id="final-score" style="font-size: 3em; color: var(--hoogvliet-green); margin: 20px 0; font-weight: 800;"></div>
            <p id="grade-text" style="font-size: 1.2em; margin-bottom: 10px; color: white;"></p>
            <p id="congrats-text" style="color: var(--text-dim); margin-bottom: 30px;"></p>
            <button onclick="location.reload()">Opnieuw Starten</button>
            <button onclick="window.location.href='index.html'" style="background: var(--hoogvliet-blue); color: white; margin-top: 10px;">Terug naar Home</button>
        </div>
    </div>
</div>

<script>
let questions = [];
let cur = 0;
let score = 0;

function triggerFeest() {
    confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 },
        colors: ['#86bc25', '#004c97', '#ffffff']
    });
}

function generateQuestions() {
    // 1. Bestelpunt Casus Generator
    const typeBP = () => {
        const lt = Math.floor(Math.random() * 3) + 1; 
        const da = Math.floor(Math.random() * 74) + 7; 
        const vv = Math.floor(Math.random() * 46) + 5; 
        const bp = (lt * da) + vv; 

        const namen = ["Daan", "Lisa", "Kevin", "Sarah", "Mohammed", "Amber"];
        const manager = namen[Math.floor(Math.random() * namen.length)];
        const producten = ["kratten bier", "pakken halfvolle melk", "potten pastasaus", "stuks brood", "potten pindakaas"];
        const product = producten[Math.floor(Math.random() * producten.length)];

        const variant = Math.floor(Math.random() * 4);
        if (variant === 0) {
            return {
                q: `<b>Casus Bestelmanagement:</b><br><br>${manager} is de voorraad van de vulploeg aan het controleren. De winkel verkoopt gemiddeld <b>${da} ${product} per dag</b>. Het distributiecentrum heeft <b>${lt} dagen</b> nodig om een nieuwe bestelling te leveren. Om te voorkomen dat het schap leegraakt bij vertraging, houdt de supermarkt een minimale veiligheidsvoorraad aan van <b>${vv} stuks</b>.<br><br>Bij welke voorraadhoogte (het Bestelpunt) moet ${manager} de handterminal pakken om een nieuwe bestelling te plaatsen?`,
                c: bp,
                exp: `Uitleg: Bestelpunt = (Levertijd × Dagafzet) + Veiligheidsvoorraad<br>(${lt} × ${da}) + ${vv} = ${bp} stuks.`
            };
        } else if (variant === 1) {
            return {
                q: `<b>Casus Veiligheidsvoorraad:</b><br><br>Op de afdeling kruidenierswaren is het automatische bestelsysteem (AVV) ingesteld op een bestelpunt of drempelwaarde van <b>${bp} ${product}</b>. Afdelingsmanager ${manager} weet dat de vrachtwagen er altijd exact <b>${lt} dagen</b> over doet om de bestelling te leveren. De gemiddelde dagelijkse verkoop van dit product is <b>${da} stuks</b>.<br><br>Hoeveel stuks heeft de supermarkt als extra veiligheidsvoorraad (VV) in het systeem staan?`,
                c: vv,
                exp: `Uitleg: Veiligheidsvoorraad = Bestelpunt - (Levertijd × Dagafzet)<br>${bp} - (${lt} × ${da}) = ${vv} stuks.`
            };
        } else if (variant === 2) {
            return {
                q: `<b>Casus Schapverkoop:</b><br><br>Teamleider ${manager} ziet in de computer dat het bestelpunt voor ${product} hard is ingesteld op <b>${bp} stuks</b>. De vaste veiligheidsvoorraad in het magazijn is <b>${vv} stuks</b>. Als er een bestelling naar het distributiecentrum wordt gestuurd, duurt het <b>${lt} dagen</b> voordat de vulploeg de rolcontainers kan uitpakken.<br><br>Wat is de gemiddelde dagafzet (DA) van dit product in de winkel?`,
                c: da,
                exp: `Uitleg: Dagafzet = (Bestelpunt - Veiligheidsvoorraad) / Levertijd<br>(${bp} - ${vv}) / ${lt} = ${da} stuks per dag.`
            };
        } else {
            return {
                q: `<b>Casus Logistieke Keten:</b><br><br>In de supermarkt is er een probleem met de levering van de ${product}. Het bestelpunt staat scherp afgesteld op <b>${bp} stuks</b>, gebaseerd op een dagafzet van <b>${da} stuks</b> en een ijzeren voorraad (veiligheidsvoorraad) van <b>${vv} stuks</b>.<br><br>Hoeveel dagen levertijd (LT) heeft het distributiecentrum volgens deze instellingen nodig om de goederen in de winkel te krijgen?`,
                c: lt,
                exp: `Uitleg: Levertijd = (Bestelpunt - Veiligheidsvoorraad) / Dagafzet<br>(${bp} - ${vv}) / ${da} = ${lt} dagen.`
            };
        }
    };

    // 2. Netto Omzet en BTW Casus Generator
    const typeNO = () => {
        const btwPercentage = Math.random() < 0.5 ? 9 : 21;
        const netto = Math.floor(Math.random() * 81 + 10) * 100;
        const btwBedrag = netto * (btwPercentage / 100);
        const consumentenomzet = netto + btwBedrag;
        const variant = Math.random() < 0.5;
        
        const afd = btwPercentage === 9 ? "Vers & Agf (9% BTW)" : "Slijterij & Cosmetica (21% BTW)";

        if (variant) {
            return {
                q: `<b>Casus Financiële Dagsluiting:</b><br><br>Bij het opmaken van de kassa's op zaterdagavond ziet de hoofdcassière dat er op de afdeling <b>${afd}</b> een totale bruto-omzet is geregistreerd van <b>€${consumentenomzet.toFixed(2).replace('.', ',')}</b> via de pin en contanten (consumentenomzet).<br><br>Welk bedrag aan Netto-omzet houdt de supermarkt over voor deze afdeling als de BTW eraf is gehaald?`,
                c: netto,
                exp: `Uitleg: Netto-omzet = Consumentenomzet / (1 + (BTW-percentage / 100))<br>€${consumentenomzet.toFixed(2).replace('.', ',')} / 1,${btwPercentage < 10 ? '0' + btwPercentage : btwPercentage} = €${netto}`
            };
        } else {
            return {
                q: `<b>Casus BTW-Afdracht:</b><br><br>De supermarkt moet de wekelijkse belastingaangifte voorbereiden. De kasregisters tonen voor de productgroep <b>${afd}</b> een bruto consumentenomzet van <b>€${consumentenomzet.toFixed(2).replace('.', ',')}</b>.<br><br>Hoeveel euro van dit bedrag moet de supermarkt als BTW afdragen aan de Belastingdienst?`,
                c: btwBedrag.toFixed(2),
                exp: `Uitleg: Netto-omzet is €${consumentenomzet.toFixed(2).replace('.', ',')} / 1,${btwPercentage < 10 ? '0' + btwPercentage : btwPercentage} = €${netto}.<br>Het BTW-bedrag is het verschil: €${consumentenomzet.toFixed(2).replace('.', ',')} - €${netto} = €${btwBedrag.toFixed(2).replace('.', ',')}`
            };
        }
    };

    // 3. Economische Voorraad Casus Generator
    const typeEV = () => {
        const tv = Math.floor(Math.random() * 500) + 200; 
        const bo = Math.floor(Math.random() * 100) + 20; 
        const vl = Math.floor(Math.random() * 50) + 10; 
        const ans = tv + bo - vl;
        
        const namen = ["Tim", "Eva", "Sven", "Sophie"];
        const manager = namen[Math.floor(Math.random() * namen.length)];

        return { 
            q: `<b>Casus Voorraadpositie:</b><br><br>Assistent-bedrijfsleider ${manager} doet de administratieve voorraadcontrole voor de diepvriesafdeling. In de computer staat dat er fysiek <b>${tv} dozen</b> in het magazijn en de vriesmeubels liggen (technische voorraad). Er is gisteren een bestelling geplaatst bij het DC voor <b>${bo} dozen</b> die momenteel onderweg is. Tegelijkertijd hebben klanten via de webshop al <b>${vl} dozen</b> gereserveerd en betaald, welke vanmiddag worden opgehaald.<br><br>Wat is de Economische Voorraad (EV) waar ${manager} rekening mee moet houden voor de commerciële planning?`, 
            c: ans, 
            exp: `Uitleg: Economische Voorraad = Technische voorraad + Bestelde goederen - Verkochte/Gereserveerde goederen<br>${tv} + ${bo} - ${vl} = ${ans} dozen.` 
        };
    };

    // 4. Servicegraad Casus Generator
    const typeSG = () => {
        const tot = Math.floor(Math.random() * 1100) + 400;
        const lev = Math.floor(tot * (Math.random() * 0.15 + 0.82));
        const gemist = tot - lev;
        const res = (lev / tot) * 100;
        const ans = Number.isInteger(res) ? res : res.toFixed(1);

        const afdelingen = ["de versafdeling", "de droge kruidenierswaren", "de non-food afdeling", "de zuivel"];
        const afd = afdelingen[Math.floor(Math.random() * afdelingen.length)];

        return { 
            q: `<b>Casus Klanttevredenheid & OOS:</b><br><br>Tijdens een service-audit op <b>${afd}</b> wordt gekeken naar de Out-Of-Stock (OOS) meldingen. In totaal kwamen er gedurende de dag vragen binnen naar <b>${tot} specifieke artikelen</b>. De vulploeg heeft <b>${lev} keer</b> het product direct uit het schap of magazijn aan de klant kunnen overhandigen. Bij de overige <b>${gemist} artikelen</b> moesten ze de klant helaas teleurstellen (nee-verkoop).<br><br>Bereken de servicegraad (SG) van deze afdeling in procenten. <i>(Rond indien nodig af op 1 decimaal)</i>`, 
            c: ans, 
            exp: `Uitleg: Servicegraad = (Direct leverbare artikelen / Totaal gevraagde artikelen) × 100%<br>(${lev} / ${tot}) × 100% = ${ans}%.` 
        };
    };

    // 5. Omzetsnelheid Generator
    const typeOS = () => {
        const omzet = (Math.floor(Math.random() * 50) + 10) * 100, gv = (Math.floor(Math.random() * 5) + 2) * 100;
        const res = omzet / gv;
        const ans = Number.isInteger(res) ? res : res.toFixed(1);
        return { q: `<b>Bereken de Omzetsnelheid:</b><br><i>(Indien nodig afronden op 1 decimaal)</i><br><br>Netto-omzet: €${omzet}<br>Gemiddelde voorraad: €${gv}`, c: ans, exp: `Uitleg: €${omzet} / €${gv} = ${ans}` };
    };

    // 6. Omzetduur Generator
    const typeOD = () => {
        const os = (Math.random() * 4 + 4).toFixed(1);
        const ans = Math.round(360 / os);
        return { q: `<b>Bereken de Omzetduur in dagen:</b><br><br>De omzetsnelheid is ${os}.<br>(Gebruik 360 dagen)`, c: ans, exp: `Uitleg: 360 / ${os} = ${ans} dagen` };
    };

    // 7. Gemiddelde voorraad (2 punten)
    const typeGV2 = () => {
        const b = Math.floor(Math.random() * 1000) + 500, e = Math.floor(Math.random() * 1000) + 500;
        const ans = (b + e) / 2;
        return { q: `<b>Bereken de Gemiddelde Voorraad (2 punten):</b><br><br>Beginvoorraad: ${b}<br>Eindvoorraad: ${e}`, c: ans, exp: `Uitleg: (${b} + ${e}) / 2 = ${ans}` };
    };

    // 8. Gemiddelde voorraad (X maanden)
    const typeGV3 = () => {
        const mnd = ["Januari", "Februari", "Maart", "April", "Mei", "Juni", "Juli", "Augustus", "September", "Oktober", "November", "December"];
        const amt = Math.floor(Math.random() * 3) + 3;
        const start = Math.floor(Math.random() * (mnd.length - amt + 1));
        let lijst = [], som = 0, tekst = "";
        
        for (let i = 0; i < amt; i++) {
            const w = Math.floor(Math.random() * 400) + 600;
            const nm = mnd[start + i];
            lijst.push(w);
            som += (i === 0 || i === amt - 1) ? 0.5 * w : w;
            tekst += `${nm}: ${w}<br>`;
        }
        
        const deler = amt - 1;
        const res = som / deler;
        const ans = Number.isInteger(res) ? res : res.toFixed(1);

        return { 
            q: `<b>Bereken de Gemiddelde Voorraad (${amt} maanden):</b><br><i>(Indien nodig afronden op 1 decimaal)</i><br><br>${tekst}`, 
            c: ans, 
            exp: `Uitleg: (0,5 × ${lijst[0]} + tussenliggende maanden + 0,5 × ${lijst[lijst.length-1]}) / ${deler} = ${ans}` 
        };
    };

    // De complete evenwichtige mix van 10 vragen
    let pool = [
        typeBP(), typeBP(), 
        typeNO(), typeNO(), 
        typeOS(), 
        typeOD(), 
        typeSG(), 
        typeEV(), 
        typeGV2(), 
        typeGV3()
    ];
    questions = pool.sort(() => 0.5 - Math.random());
}

function show() {
    const q = questions[cur];
    document.getElementById("counter").innerText = `VRAAG ${cur + 1}/10`;
    document.getElementById("q-text").innerHTML = q.q;
    document.getElementById("user-input").value = "";
    document.getElementById("user-input").disabled = false;
    document.getElementById("feedback").style.display = "none";
    document.getElementById("check-btn").style.display = "block";
    document.getElementById("next-btn").style.display = "none";
    setTimeout(() => document.getElementById("user-input").focus(), 10);
}

function checkAnswer() {
    // Stripped automatisch eurotekens, procenten en spaties, en zet komma's om naar punten
    const val = document.getElementById("user-input").value.replace(',', '.').replace('%', '').replace('€', '').trim();
    if (val === "") return;
    const q = questions[cur];
    document.getElementById("user-input").disabled = true;
    document.getElementById("check-btn").style.display = "none";
    document.getElementById("next-btn").style.display = "block";
    const fb = document.getElementById("feedback");
    fb.style.display = "block";

    if (parseFloat(val) == parseFloat(q.c)) {
        score++;
        fb.className = "feedback-correct";
        fb.innerHTML = "<b>Lekker gewerkt!</b> Dit is het juiste antwoord.";
    } else {
        fb.className = "feedback-wrong";
        
        // Controleer of de vraag over euro's gaat (als het woord '€' of 'omzet' in de vraag staat)
        const isGeld = q.q.toLowerCase().includes('€') || q.q.toLowerCase().includes('omzet');
        const antwoordWeergave = isGeld ? `€${q.c.toString().replace('.', ',')}` : q.c.toString().replace('.', ',');

        fb.innerHTML = `<b>Helaas!</b> Het juiste antwoord was <b>${antwoordWeergave}</b>.<br><br>${q.exp}`;
    }
}

function nextQuestion() {
    cur++;
    if (cur < 10) show();
    else end();
}

function end() {
    document.getElementById("quiz-area").style.display = "none";
    document.getElementById("result-area").style.display = "block";
    document.getElementById("final-score").innerText = `${score} / 10`;
    
    let grade = (score / 10) * 10;
    document.getElementById("grade-text").innerText = "Je cijfer is een: " + grade.toFixed(1);
    document.getElementById("congrats-text").innerText = score >= 6 ? "Gefeliciteerd! Je hebt een voldoende en bent klaar voor het examen." : "Nog even oefenen met de formules, je komt er wel!";
    
    if (score >= 6) {
        triggerFeest();
    }
}

generateQuestions();
show();

document.getElementById("user-input").onkeypress = (e) => { 
    if(e.key === "Enter") {
        document.getElementById("check-btn").style.display !== "none" ? checkAnswer() : nextQuestion();
    }
};
</script>
</body>
</html>
